<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memoria - Digital Yearbook Platform</title>
    <script>
      (function () {
        try {
          var schoolDefault = localStorage.getItem("memoria_school_theme_default");
          var mode = localStorage.getItem("memoria_theme_mode");
          var legacy = localStorage.getItem("memoria_theme");
          if (mode !== "system" && mode !== "light" && mode !== "dark") {
            if (legacy === "light" || legacy === "dark") mode = legacy;
            else if (schoolDefault === "light" || schoolDefault === "dark") mode = schoolDefault;
            else mode = "system";
          }
          var prefersDark =
            window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = mode === "system" ? (prefersDark ? "dark" : "light") : mode;
          var root = document.documentElement;
          if (resolved === "dark") {
            root.classList.add("dark");
            root.style.colorScheme = "dark";
          } else {
            root.classList.remove("dark");
            root.style.colorScheme = "light";
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
